name: Build and deploy Node.js app to Azure Web App - PitchMDTEST

on:
  push:
    branches:
      - main
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-latest
    permissions:
      contents: read
    steps:
      - uses: actions/checkout@v4

      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '22.x'

      - name: Install and build
        run: |
          npm ci
          npm run build

      - name: Zip artifact for deployment
        run: zip release.zip ./* .next -r -x "node_modules/*"

      - name: Upload artifact for deployment job
        uses: actions/upload-artifact@v4
        with:
          name: node-app
          path: release.zip

  deploy:
    runs-on: ubuntu-latest
    needs: build
    permissions:
      id-token: write
      contents: read
    steps:
      - name: Download artifact from build job
        uses: actions/download-artifact@v4
        with:
          name: node-app

      - name: Unzip artifact
        run: unzip release.zip

      - name: Login to Azure
        uses: azure/login@v2
        with:
          client-id: ${{ secrets.AZUREAPPSERVICE_CLIENTID_CA62CB8A2BB4484A99E5B31DF3706E3A }}
          tenant-id: ${{ secrets.AZUREAPPSERVICE_TENANTID_97E77C35CEF047F8AAA0B9C8726BEE31 }}
          subscription-id: ${{ secrets.AZUREAPPSERVICE_SUBSCRIPTIONID_A9B565CF62CE4947BBF91579E6BC1629 }}

      - name: 'Deploy to Azure Web App'
        id: deploy-to-webapp
        uses: azure/webapps-deploy@v3
        with:
          app-name: 'PitchMDTEST'
          slot-name: 'Production'
          package: .
